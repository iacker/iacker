name: Metrics
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          user: iacker
          config_display: large
          config_padding: 6%
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          extras_css: >
            svg{background:#0d1117!important;color:#c9d1d9!important}
            svg *{color:#c9d1d9}
            .day[fill="#ebedf0"]{fill:#161b22!important}
            text{fill:#c9d1d9!important}
            .title,h2,.header{fill:#76b900!important;color:#76b900!important}
            a{color:#76b900!important}
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics-isocalendar.svg
          base: ""
          user: iacker
          config_timezone: Europe/Paris
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: >
            svg{background:#0d1117!important;color:#c9d1d9!important}
            text{fill:#c9d1d9!important}
            .day[fill="#ebedf0"]{fill:#161b22!important}
            .calendar-year,.title{fill:#76b900!important}
