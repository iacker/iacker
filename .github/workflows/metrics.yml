name: Metrics
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Paris
          user: iacker
          config_display: large
          config_padding: 6%
          # Thème sombre GitHub + accents verts NVIDIA
          config_base16: "0d1117,161b22,76b900,76b900,c9d1d9,c9d1d9,76b900,76b900"
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_colors: 76b900, 30a14e, 40c463, 9be9a8, 216e39, 34d058, 2ea043, 238636
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
  isocalendar:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics-isocalendar.svg
          base: ""
          user: iacker
          config_timezone: Europe/Paris
          config_base16: "0d1117,161b22,76b900,76b900,c9d1d9,c9d1d9,76b900,76b900"
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
